# Copy these values into Streamlit Community Cloud secrets.
# Do not commit a real .streamlit/secrets.toml file.

OPENAI_KEY = "sk-..."
HF_REPO_ID = "username/dataset-name"
HF_TOKEN = "hf_..."

# Optional. Set this when a zipped/tarred ChromaDB folder is uploaded to Hugging Face.
# Example archive contents can be either:
# - chroma_db/chroma.sqlite3 plus Chroma index folders
# - chroma.sqlite3 plus Chroma index folders at archive root
HF_CHROMA_ARCHIVE = "chroma_db.zip"
